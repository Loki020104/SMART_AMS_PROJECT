version: '3.9'

services:
  # ══════════════════════════════════════════════════════════════════════════
  # NGINX Reverse Proxy - HTTPS Termination & Rate Limiting
  # ══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:latest
    container_name: ams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      
      # SSL certificates (mount from host)
      - /etc/letsencrypt/live/yourdomain.com:/etc/nginx/ssl:ro
      
      # Log volume
      - nginx_logs:/var/log/nginx
    
    networks:
      - ams-network
    
    depends_on:
      - app
    
    # Security context
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache
      - /var/log/nginx
    
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════════════════
  # Flask Backend Application
  # ══════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile.secure
    container_name: ams-backend
    restart: unless-stopped
    
    # Environment variables
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - HTTPS_ONLY=true
      - DEBUG=false
      - WORKERS=4
      - LOG_FILE=/var/log/ams/application.log
      - SECURITY_LOG_FILE=/var/log/ams/security.log
      - AUTH_LOG_FILE=/var/log/ams/auth.log
      - AUDIT_LOG_FILE=/var/log/ams/audit.log
    
    ports:
      - "8080:8080"
    
    volumes:
      # Log volumes (persistent)
      - app_logs:/var/log/ams
      - audit_logs:/var/log/ams
      
      # Temporary storage
      - /tmp
    
    networks:
      - ams-network
    
    depends_on:
      - redis
      - db-proxy
    
    # Security context - run as non-root
    user: 1000:1000
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # ══════════════════════════════════════════════════════════════════════════
  # Redis - Rate Limiting & Caching
  # ══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: ams-redis
    restart: unless-stopped
    
    # Security settings
    command: >
      redis-server
      --requirepass $${REDIS_PASSWORD:-change-me}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    
    volumes:
      # Persistent data volume
      - redis_data:/data
    
    networks:
      - ams-network
    
    cap_drop:
      - ALL
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════════════════
  # Cloud SQL Proxy (for Google Cloud SQL)
  # Only needed if using Google Cloud SQL
  # ══════════════════════════════════════════════════════════════════════════
  db-proxy:
    image: gcr.io/cloud-sql-docker/cloud-sql-proxy:1.33.2
    container_name: ams-db-proxy
    restart: unless-stopped
    
    # Database connection string
    command: -instances=PROJECT:REGION:INSTANCE=tcp:5432
    
    # Google Cloud credentials (mount from host)
    volumes:
      - /path/to/serviceAccountKey.json:/secrets/service-account.json:ro
    
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/service-account.json
    
    networks:
      - ams-network
    
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════════════════
  # Prometheus Monitoring (Optional)
  # ══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: ams-prometheus
    restart: unless-stopped
    
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    
    networks:
      - ams-network
    
    ports:
      - "9090:9090"
    
    cap_drop:
      - ALL
    
    read_only: true
    tmpfs:
      - /tmp

  # ══════════════════════════════════════════════════════════════════════════
  # Grafana Dashboards (Optional)
  # ══════════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: ams-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-change-me}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning:ro
    
    networks:
      - ams-network
    
    ports:
      - "3000:3000"
    
    depends_on:
      - prometheus
    
    cap_drop:
      - ALL
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════════════════
  # PostgreSQL Backup Service (Optional)
  # ══════════════════════════════════════════════════════════════════════════
  backup:
    image: postgresql:15-alpine
    container_name: ams-backup
    restart: unless-stopped
    
    environment:
      PGHOST: db-proxy
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: smartams
    
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - db_backups:/backups
    
    command: >
      sh -c "
      while true; do
        pg_dump -Fc ${PGDATABASE} > /backups/backup-$(date +%Y%m%d-%H%M%S).dump
        find /backups -name 'backup-*' -mtime +7 -delete
        sleep 86400
      done
      "
    
    networks:
      - ams-network
    
    depends_on:
      - db-proxy
    
    cap_drop:
      - ALL

# ══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════════════════
networks:
  ams-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ══════════════════════════════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════════════════════════════
volumes:
  # Application logs (persistent)
  app_logs:
    driver: local
  
  audit_logs:
    driver: local
  
  nginx_logs:
    driver: local
  
  # Redis persistent data (optional)
  redis_data:
    driver: local
  
  # Database backups
  db_backups:
    driver: local
  
  # Prometheus data
  prometheus_data:
    driver: local
  
  # Grafana data
  grafana_data:
    driver: local

# ══════════════════════════════════════════════════════════════════════════
# USAGE
# ══════════════════════════════════════════════════════════════════════════
#
# Start all services:
#   docker-compose -f docker-compose.secure.yml up -d
#
# View logs:
#   docker-compose -f docker-compose.secure.yml logs -f app
#
# Stop all services:
#   docker-compose -f docker-compose.secure.yml down
#
# Update and restart:
#   docker-compose -f docker-compose.secure.yml up -d --build
#
# View running services:
#   docker-compose -f docker-compose.secure.yml ps
#
# ══════════════════════════════════════════════════════════════════════════
